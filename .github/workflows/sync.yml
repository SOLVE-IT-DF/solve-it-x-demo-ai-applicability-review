name: Sync with SOLVE-IT repository

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Sync technique/weakness/mitigation folders from SOLVE-IT
        run: python scripts/update-solve-it-x.py --path ai_applicability_review/ai_applicability_data --yes

      - name: Initialise any new technique folders
        run: python scripts/init-new-techniques.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add ai_applicability_review/
          git diff --cached --quiet && echo "No new entries from SOLVE-IT" || {
            git commit -m "Sync: add new techniques/weaknesses/mitigations from SOLVE-IT"
            git push
          }
