name: Add AI Applicability Entry
description: Submit a new AI applicability entry for a digital forensic technique
title: "Add entry: [AI entry description]"
labels: []
body:
  - type: markdown
    attributes:
      value: "Add the **ai-entry** label to this issue to submit it as a pull request."

  - type: input
    id: technique_id
    attributes:
      label: Technique ID
      description: The SOLVE-IT technique identifier (e.g. DFT-1001)
      placeholder: DFT-xxxx
    validations:
      required: true

  - type: dropdown
    id: category
    attributes:
      label: Category
      description: The AI applicability category for this entry
      options:
        - In Tools
        - Academic Implementation
        - Academic Idea
        - Non-AI
    validations:
      required: true

  - type: textarea
    id: bibtex
    attributes:
      label: BibTeX Entry
      description: BibTeX citation for the reference
      placeholder: copy BibTeX here
      render: bibtex
    validations:
      required: true

  - type: textarea
    id: notes
    attributes:
      label: Notes
      description: Describe how the supplied reference documents the way that AI applies to this technique
      placeholder: Describe the AI relevance...
    validations:
      required: true
